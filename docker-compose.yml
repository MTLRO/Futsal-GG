version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: futsal-gg-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-futsalgg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-futsalgg}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - futsal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-futsalgg}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futsal-gg-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-futsalgg}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-futsalgg}?schema=public&connection_limit=10&pool_timeout=20
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://futsalgg.com}
    networks:
      - futsal-network
    command: sh -c "npm start"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  futsal-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
